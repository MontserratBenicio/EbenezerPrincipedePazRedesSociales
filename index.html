<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iglesia de Cristo Príncipe de Paz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    background-image:url('fondo.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
}

.contenedor{
    position:relative;
    z-index:2;

    width:100%;
    max-width:500px;

    padding:25px 20px;
}

.titulo{
    text-align:center;
    margin-bottom:25px;
}

.titulo h1{
    color:white;
    font-size:28px;
    font-weight:700;

    text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.titulo p{
    color:white;
    margin-top:8px;
    font-size:14px;

    text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.botones{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    width:100%;
    height:58px;

    border:none;
    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    background:rgba(255,255,255,.88);

    backdrop-filter:blur(12px);

    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

.icon-img{
    width:24px;
    height:24px;
    margin-right:12px;
}

.facebook{
    color:#1877F2;
}

.instagram{
    color:#C13584;
}

.spotify{
    color:#1DB954;
}

.maps{
    color:#34A853;
}

.uber{
    color:#000;
}

.facebook:hover{
    background:#1877F2;
    color:white;
}

.instagram:hover{
    background:linear-gradient(
        45deg,
        #F58529,
        #DD2A7B,
        #8134AF,
        #515BD4
    );
    color:white;
}

.spotify:hover{
    background:#1DB954;
    color:white;
}

.maps:hover{
    background:#34A853;
    color:white;
}

.uber:hover{
    background:black;
    color:white;
}

@media (min-width:768px){

    .contenedor{
        max-width:450px;
        padding-top:40px;
    }

    .titulo h1{
        font-size:34px;
    }
}

</style>

</head>

<body>

<div class="contenedor">

    <div class="titulo">
        <h1>Príncipe de Paz</h1>
        <p>Síguenos en nuestras redes sociales</p>
    </div>

    <div class="botones">

        <button onclick="abrirFacebook()" class="btn facebook">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
            Facebook
        </button>

        <button onclick="abrirInstagram()" class="btn instagram">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
            Instagram
        </button>

        <button onclick="abrirSpotify()" class="btn spotify">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/174/174872.png">
            Spotify
        </button>

        <button onclick="abrirMaps()" class="btn maps">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/2991/2991231.png">
            Cómo llegar
        </button>

        <button onclick="abrirUber()" class="btn uber">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png">
            Pedir Uber
        </button>

    </div>

</div>

<script>

const direccion =
"Príncipe De Paz - Ministerios Ebenezer Chalco";

function abrirFacebook() {

    window.open(
        "https://www.facebook.com/share/1DfhQyCYCP/",
        "_blank"
    );
}

function abrirInstagram() {

    window.open(
        "https://www.instagram.com/ebenezer_chalco/",
        "_blank"
    );
}

function abrirSpotify() {

    window.open(
        "https://open.spotify.com/show/6UhKZrhcGJOQ4Qnvo0kfpK?si=05ac9bb2fadc432a",
        "_blank"
    );
}

function abrirMaps() {

    const mapsURL =
        "https://www.google.com/maps/search/?api=1&query=" +
        encodeURIComponent(direccion);

    window.open(mapsURL, "_blank");
}

function abrirUber() {

    const uberURL =
        "https://m.uber.com/ul/?action=setPickup&dropoff[formatted_address]=" +
        encodeURIComponent(
            "Príncipe De Paz - Ministerios Ebenezer Chalco"
        );

    window.open(uberURL, "_blank");
}

</script>

</body>
</html>
