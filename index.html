<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Príncipe de Paz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    background-image:url('fondo.png');
    background-size:cover;
    background-position:60% bottom;
    background-repeat:no-repeat;

    min-height:100vh;

    display:flex;
    justify-content:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.15);
    z-index:1;
}

.contenedor{
    position:relative;
    z-index:2;

    width:100%;
    max-width:500px;

    padding:35px 25px;
}

.titulo{
    text-align:center;
    margin-bottom:35px;
}

.titulo h1{
    color:white;
    font-size:38px;
    font-weight:800;
    letter-spacing:2px;

    text-shadow:0 3px 15px rgba(0,0,0,.5);
}

.titulo p{
    color:white;
    margin-top:10px;
    font-size:16px;

    text-shadow:0 3px 15px rgba(0,0,0,.5);
}

.botones{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn{
    width:100%;
    height:72px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);

    border:2px solid rgba(255,255,255,.35);

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-size:18px;
    font-weight:600;

    cursor:pointer;

    transition:.25s;
}

.btn:hover{
    background:rgba(255,255,255,.15);
    transform:translateY(-2px);
}

.btn:active{
    transform:scale(.98);
}

.icon-img{
    width:32px;
    height:32px;
    margin-right:15px;
}

@media(max-width:480px){

    body{
        background-position:65% bottom;
    }

    .contenedor{
        padding:45px 20px;
    }

    .titulo h1{
        font-size:30px;
    }

    .titulo p{
        font-size:14px;
    }

    .btn{
        height:64px;
        font-size:16px;
    }

    .icon-img{
        width:28px;
        height:28px;
    }
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="titulo">
        <h1>IGLESIA DE CRISTO</h1>
        <h1>PRÍNCIPE DE PAZ</h1>
        <h1>EBENEZER</h1>
        <p>Síguenos en nuestras redes sociales</p>
    </div>

    <div class="botones">

        <button onclick="abrirFacebook()" class="btn">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/124/124010.png"
            alt="Facebook">
            Facebook
        </button>

        <button onclick="abrirInstagram()" class="btn">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
            alt="Instagram">
            Instagram
        </button>

        <button onclick="abrirSpotify()" class="btn">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/174/174872.png"
            alt="Spotify">
            Spotify
        </button>

        <button onclick="abrirMaps()" class="btn">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/2991/2991231.png"
            alt="Maps">
            Cómo llegar
        </button>

        <button onclick="abrirUber()" class="btn">
            <img class="icon-img"
            src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png"
            alt="Uber">
            Pedir Uber
        </button>

    </div>

</div>

<script>

const direccion = "Príncipe De Paz - Ministerios Ebenezer Chalco";

function abrirFacebook(){
    window.open(
        "https://www.facebook.com/share/1DfhQyCYCP/",
        "_blank"
    );
}

function abrirInstagram(){
    window.open(
        "https://www.instagram.com/ebenezer_chalco/",
        "_blank"
    );
}

function abrirSpotify(){
    window.open(
        "https://open.spotify.com/show/6UhKZrhcGJOQ4Qnvo0kfpK?si=05ac9bb2fadc432a",
        "_blank"
    );
}

function abrirMaps(){

    const mapsURL =
        "https://www.google.com/maps/search/?api=1&query=" +
        encodeURIComponent(direccion);

    window.open(mapsURL, "_blank");
}

function abrirUber(){

    const uberURL =
        "https://m.uber.com/ul/?action=setPickup&dropoff[formatted_address]=" +
        encodeURIComponent(direccion);

    window.open(uberURL, "_blank");
}

</script>

</body>
</html>
