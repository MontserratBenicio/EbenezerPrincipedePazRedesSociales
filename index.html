<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iglesia de Cristo Príncipe de Paz</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            padding: 20px;
        }

        /* Oscurece un poco la imagen para que resalte la tarjeta */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: -1;
        }

        .card {
            background: rgba(255,255,255,0.90);
            backdrop-filter: blur(10px);

            width: 100%;
            max-width: 400px;

            padding: 30px;

            border-radius: 22px;

            box-shadow: 0 12px 30px rgba(0,0,0,0.20);

            text-align: center;
        }

        h2 {
            color: #1e4f9a;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #6b7a90;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            padding: 15px;
            margin: 10px 0;

            border-radius: 12px;

            font-size: 15px;
            font-weight: 600;

            cursor: pointer;

            background: white;

            border: 2px solid #1e5aa8;

            color: #1e5aa8;

            transition: all 0.25s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .icon-img {
            width: 22px;
            height: 22px;
            margin-right: 12px;
        }

        .facebook {
            border-color: #1877F2;
            color: #1877F2;
        }

        .facebook:hover {
            background: #1877F2;
            color: white;
        }

        .instagram {
            border-color: #C13584;
            color: #C13584;
        }

        .instagram:hover {
            background: linear-gradient(
                45deg,
                #F58529,
                #DD2A7B,
                #8134AF,
                #515BD4
            );
            color: white;
            border: none;
        }

        .spotify {
            border-color: #1DB954;
            color: #1DB954;
        }

        .spotify:hover {
            background: #1DB954;
            color: white;
        }

        .maps {
            border-color: #34A853;
            color: #34A853;
        }

        .maps:hover {
            background: #34A853;
            color: white;
        }

        .uber {
            border-color: #000;
            color: #000;
        }

        .uber:hover {
            background: #000;
            color: white;
        }

    </style>
</head>

<body>

    <div class="card">

        <h2>Iglesia de Cristo Príncipe de Paz Ebenezer</h2>

        <p>
            Síguenos en nuestras redes sociales
        </p>

        <button onclick="abrirFacebook()" class="btn facebook">
            <img
                class="icon-img"
                src="https://cdn-icons-png.flaticon.com/512/124/124010.png"
                alt="Facebook"
            >
            Facebook
        </button>

        <button onclick="abrirInstagram()" class="btn instagram">
            <img
                class="icon-img"
                src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"
                alt="Instagram"
            >
            Instagram
        </button>

        <button onclick="abrirSpotify()" class="btn spotify">
            <img
                class="icon-img"
                src="https://cdn-icons-png.flaticon.com/512/174/174872.png"
                alt="Spotify"
            >
            Spotify
        </button>

        <button onclick="abrirMaps()" class="btn maps">
            <img
                class="icon-img"
                src="https://cdn-icons-png.flaticon.com/512/2991/2991231.png"
                alt="Maps"
            >
            Cómo llegar
        </button>

        <button onclick="abrirUber()" class="btn uber">
            <img
                class="icon-img"
                src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png"
                alt="Uber"
            >
            Pedir Uber
        </button>

    </div>

    <script>

        const direccion =
            "Príncipe De Paz - Ministerios Ebenezer Chalco";

        function abrirFacebook() {

            window.open(
                "https://www.facebook.com/share/1DfhQyCYCP/",
                "_blank"
            );
        }

        function abrirInstagram() {

            window.open(
                "https://www.instagram.com/ebenezer_chalco/",
                "_blank"
            );
        }

        function abrirSpotify() {

            window.open(
                "https://open.spotify.com/show/6UhKZrhcGJOQ4Qnvo0kfpK?si=05ac9bb2fadc432a",
                "_blank"
            );
        }

        function abrirMaps() {

            const mapsURL =
                "https://www.google.com/maps/search/?api=1&query=" +
                encodeURIComponent(direccion);

            window.open(mapsURL, "_blank");
        }

        function abrirUber() {

            const uberURL =
                "https://m.uber.com/ul/?action=setPickup&dropoff[formatted_address]=" +
                encodeURIComponent(
                    "Príncipe De Paz - Ministerios Ebenezer Chalco"
                );

            window.open(uberURL, "_blank");
        }

    </script>

</body>
</html>
